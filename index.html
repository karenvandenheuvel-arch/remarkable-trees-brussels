<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>remarkable-trees-brussels</title>
</head>

<body>
  <header>
    <h1>Remarkable Trees of Brussels</h1>
    <div class="language-toggle">
      <button type="button" class="lang-btn active" data-lang="nl">NL</button>
      <button type="button" class="lang-btn" data-lang="fr">FR</button>
    </div>
    <div class="view-toggle">
      <button type="button" class="view-btn active" data-view="list">Lijst</button>
      <button type="button" class="view-btn" data-view="map">Kaart</button>
    </div>
  </header>
  <main>
    <section id="controls" aria-label="Search and filter controls">
      <div class="search-sort-row">
        <input type="text" id="search-input" placeholder="Zoek een boom...">
        <select id="sort-select">
          <option value="">Sorteer op...</option>
          <option value="name-asc">Naam (A-Z)</option>
          <option value="name-desc">Naam (Z-A)</option>
          <option value="girth-desc">Omtrek (grootste eerst)</option>
          <option value="girth-asc">Omtrek (kleinste eerst)</option>
          <option value="crown-desc">Kruin (grootste eerst)</option>
          <option value="crown-asc">Kruin (kleinste eerst)</option>
        </select>
      </div>
      <button type="button" id="toggle-filters-btn"><span id="filters-label">Filters </span><span
          id="tree-count-inline"></span></button>
      <div id="filter-wrapper">
        <select id="rarity-select">
          <option value="">Alle zeldzaamheid</option>
          <option value="0">Gewoon</option>
          <option value="0.5">Bijzonder</option>
          <option value="1">Zeldzaam</option>
        </select>
        <select id="species-select">
          <option value="">Alle soorten</option>
        </select>
        <div class="distance-filter">
          <button type="button" id="locate-btn">Gebruik mijn locatie</button>
          <div class="slider-row">
            <label for="distance-slider" id="max-distance-label">Afstand:</label>
            <input type="range" id="distance-slider" min="100" max="5000" step="100" value="1000" disabled>
            <span id="distance-value"></span>
          </div>
          <span id="location-error" class="error-message"></span>
        </div>
        <div class="favorites-and-reset">
          <button type="button" id="reset-filters-btn" class="reset-btn">Reset filters</button>
          <label class="favorites-row">
            <input type="checkbox" id="favorites-only-checkbox">
            <span id="favorites-only-label">Alleen favorieten</span>
          </label>
          <button type="button" id="reset-favorites-btn" class="reset-btn">Reset favorieten</button>
        </div>
      </div>
    </section>
    <p id="tree-count"></p>
    <div id="map"></div>
    <div id="app"></div>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
